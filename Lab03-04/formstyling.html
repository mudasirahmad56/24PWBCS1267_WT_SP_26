<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 6: Form Styling</title>
    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container forms-page">
        <a href="index.html" class="back-nav">&larr; Back to Home</a>

        <header class="task-header main-header">
            <h1>Task 6: Form Styling</h1>
            <p>Registration form with custom inputs, focus, error states, and success confirmations.</p>
        </header>

        <section class="form-section">
            <div class="form-container">
                <h2>Create an Account</h2>
                <form action="#" class="custom-form">

                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="Enter your username">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address <span class="error-msg"></span></label>
                        <input type="email" id="email" class="form-control error-state" placeholder="you@example.com">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control success-state"
                            placeholder="Enter password">
                        <span class="success-msg">Password strength is excellent!</span>
                    </div>

                    <div class="form-group">
                        <label for="country">Country</label>
                        <select id="country" class="form-control custom-select">
                            <option value="">Select your country</option>
                            <option value="us">United States</option>
                            <option value="uk">United Kingdom</option>
                            <option value="pk">Pakistan</option>
                        </select>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="custom-checkbox">
                            <input type="checkbox" checked>
                            <span class="checkmark"></span>
                            I agree to the Terms of Service
                        </label>
                    </div>

                    <button type="submit" class="submit-btn" disabled>Register Account</button>
                    <!-- Disabled globally temporarily to show form styling only -->
                </form>
            </div>
        </section>

        <!-- Showing visually a Success Confirmation box style -->
        <section class="form-section">
            <div class="success-box">
                <div class="success-icon">✓</div>
                <h3>Registration Successful!</h3>
                <p>Welcome to our platform. Please check your email to verify your account.</p>
                <button class="ok-btn">Go to Dashboard</button>
            </div>
        </section>
    </div>
</body>

</html>
