<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-commerce Product Grid</title>

<link rel="stylesheet" href="../styles/base.css">
<link rel="stylesheet" href="../styles/grid.css">
</head>
<body>

<h1 class="ecom-title">E-commerce Product Listing</h1>

<div class="ecom-container">
    <aside class="filter-sidebar">
        <h2>Filters</h2>
        <ul>
            <li>Category 1</li>
            <li>Category 2</li>
            <li>Category 3</li>
            <li>Category 4</li>
        </ul>
    </aside>

    <main class="product-grid">
        <div class="product-card">
            <img src="https://picsum.photos/300/200?1" alt="Product 1">
            <h3>Product 1</h3>
            <p>$29.99</p>
        </div>
        <div class="product-card">
            <img src="https://picsum.photos/300/200?2" alt="Product 2">
            <h3>Product 2</h3>
            <p>$39.99</p>
        </div>
        <div class="product-card">
            <img src="https://picsum.photos/300/200?3" alt="Product 3">
            <h3>Product 3</h3>
            <p>$24.99</p>
        </div>
        <div class="product-card">
            <img src="https://picsum.photos/300/200?4" alt="Product 4">
            <h3>Product 4</h3>
            <p>$49.99</p>
        </div>
        <div class="product-card">
            <img src="https://picsum.photos/300/200?5" alt="Product 5">
            <h3>Product 5</h3>
            <p>$19.99</p>
        </div>
        <div class="product-card">
            <img src="https://picsum.photos/300/200?6" alt="Product 6">
            <h3>Product 6</h3>
            <p>$59.99</p>
        </div>
    </main>
</div>

</body>
</html>
