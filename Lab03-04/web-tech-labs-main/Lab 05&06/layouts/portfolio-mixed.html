<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Portfolio Layout</title>

<link rel="stylesheet" href="../styles/base.css">
<link rel="stylesheet" href="../styles/grid.css">
</head>
<body>

<header class="portfolio-header">
    <h1>My Portfolio</h1>
</header>

<div class="portfolio-container">

    <!-- Sidebar Navigation -->
    <aside class="portfolio-sidebar">
        <h2>Navigation</h2>
        <ul>
            <li>Home</li>
            <li>About Me</li>
            <li>Projects</li>
            <li>Contact</li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="portfolio-main">
        
        <!-- Decorative Positioned Element -->
        <div class="decorative-circle"></div>

        <!-- About Section -->
        <section class="about">
            <h2>About Me</h2>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. I create web apps, designs, and interactive experiences.</p>
        </section>

        <!-- Projects Section -->
        <section class="projects">
            <h2>Projects</h2>
            <div class="project-gallery">
                <div class="project-card"><img src="../images/html.png" alt="Project 1"><p>Project 1</p></div>
                <div class="project-card"><img src="../images/java.png" alt="Project 2"><p>Project 2</p></div>
                <div class="project-card"><img src="../images/mysql.png" alt="Project 3"><p>Project 3</p></div>
                <div class="project-card"><img src="../images/html.png" alt="Project 4"><p>Project 4</p></div>
                <div class="project-card"><img src="../images/java.png" alt="Project 5"><p>Project 5</p></div>
                <div class="project-card"><img src="../images/mysql.png" alt="Project 6"><p>Project 6</p></div>
            </div>
        </section>
    </main>
</div>

</body>
</html>
