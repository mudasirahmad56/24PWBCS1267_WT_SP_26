<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holy Grail Layout Comparison</title>

<link rel="stylesheet" href="../styles/float.css">
<link rel="stylesheet" href="../styles/flexbox.css">
<link rel="stylesheet" href="../styles/grid.css">

</head>
<body>

<h1>Holy Grail Layout Comparison</h1>

<section>
<h2>1. Float-Based Layout</h2>
<div class="holy-float">
    <header>Header</header>
    <aside class="left">Left Sidebar</aside>
    <main>Main Content</main>
    <aside class="right">Right Sidebar</aside>
    <footer>Footer</footer>
</div>
</section>

<section>
<h2>2. Flexbox Layout</h2>
<div class="holy-flex">
    <header>Header</header>
    <div class="content-flex">
        <aside class="left">Left Sidebar</aside>
        <main>Main Content</main>
        <aside class="right">Right Sidebar</aside>
    </div>
    <footer>Footer</footer>
</div>
</section>

<section>
<h2>3. CSS Grid Layout</h2>
<div class="holy-grid">
    <header>Header</header>
    <aside class="left">Left Sidebar</aside>
    <main>Main Content</main>
    <aside class="right">Right Sidebar</aside>
    <footer>Footer</footer>
</div>
</section>

</body>
</html>
