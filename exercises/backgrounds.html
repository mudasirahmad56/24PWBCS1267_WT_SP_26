<!DOCTYPE html>
<html>
<head>

<style>

.solid{
background:red;
color:white;
padding:40px;
}

.gradient{
background:linear-gradient(blue,purple);
color:white;
padding:40px;
}

.radial{
background:radial-gradient(circle, yellow, orange);
padding:40px;
}

</style>

</head>

<body>

<h1>Background Examples</h1>

<div class="solid">Solid Color</div>

<div class="gradient">Linear Gradient</div>

<div class="radial">Radial Gradient</div>

</body>
</html>
